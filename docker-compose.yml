name: ultraviolet

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ultraviolet:ultraviolet@postgres:5432/ultraviolet
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=goekdenizguelmez/JOSIEFIED-Qwen3:8b
      - EMBEDDING_MODEL=nomic-embed-text
      - CORS_ORIGINS=http://localhost:3000
      - DEMUCS_DEVICE=cuda
      - STEM_CACHE_DIR=/app/data/stems
    depends_on:
      - postgres
      - chromadb
      - ollama
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=ultraviolet
      - POSTGRES_PASSWORD=ultraviolet
      - POSTGRES_DB=ultraviolet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ultraviolet"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  postgres_data:
  chroma_data:
  ollama_data:
